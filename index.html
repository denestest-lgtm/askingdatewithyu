<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Invite buat ayang ❤️</title>
    <style>
        :root {
            --bg: #fff0f3;
            --main: #ff4d6d;
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        .container { position: relative; z-index: 10; width: 90%; max-width: 400px; text-align: center; }

        h1 { color: var(--main); font-size: 26px; margin-bottom: 30px; font-weight: bold; line-height: 1.4; }

        .btn-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 350px; }

        .btn {
            display: flex; align-items: center; justify-content: center;
            border: none; border-radius: 50px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(255, 77, 109, 0.2);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        #yesBtn { 
            background: var(--main); color: var(--white); 
            width: 120px; height: 60px; font-size: 18px;
            animation: float 3s ease-in-out infinite; 
            z-index: 100;
        }

        #noBtn { 
            background: var(--white); color: var(--main); 
            border: 2px solid var(--main); 
            width: 120px; height: 60px; font-size: 18px; 
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        #dateBox, #success { display: none; }

        input { 
            padding: 15px; border: 2px solid var(--main); width: 85%; 
            font-size: 18px; margin-bottom: 25px; border-radius: 30px; 
            text-align: center; outline: none; background: white; color: #333;
        }

        .confirm-btn {
            background: var(--main); color: white; width: 100%; height: 60px; border-radius: 50px;
        }

        #success { font-size: 24px; color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="qBox">
            <h1 id="mainTitle">main yuk ayyy, kangen 👉👈</h1>
            <div class="btn-wrapper">
                <button id="yesBtn" class="btn">YES</button>
                <button id="noBtn" class="btn">NO</button>
            </div>
        </div>

        <div id="dateBox">
            <h1>Pick a date! ❤️</h1>
            <input type="date" id="dateInput">
            <button id="confirmBtn" class="btn confirm-btn">CONFIRM DATE</button>
        </div>

        <div id="success">
            <h1 id="finalMsg"></h1>
            <span style="font-size: 80px;">🌸</span>
        </div>
    </div>

    <script>
        var myPhone = "6281912565837"; 
        var yes = document.getElementById('yesBtn');
        var no = document.getElementById('noBtn');
        var qBox = document.getElementById('qBox');
        var dBox = document.getElementById('dateBox');
        
        var w = 120, h = 60, f = 18, count = 0;
        var secondsPassed = 0;
        var gameEnded = false;

        // TIMER LOGIC
        var timer = setInterval(function() {
            if(gameEnded) return;
            secondsPassed += 1;

            // Setiap 10 detik muncul alert
            if (secondsPassed % 5 === 0 && secondsPassed < 20) {
                alert("Pilih iya apa iya? susah amat mencet yes");
            }

            // Setelah 60 detik, paksa pilih YES
            if (secondsPassed >= 20) {
                clearInterval(timer);
                forceYes();
            }
        }, 1000);

        function forceYes() {
            no.style.display = 'none';
            yes.innerText = "KLIK INI GAK? 🫵😡";
            yes.style.position = 'fixed';
            yes.style.top = '50%';
            yes.style.left = '50%';
            yes.style.transform = 'translate(-50%, -50%)';
            yes.style.width = '90vw';
            yes.style.height = '40vh';
            yes.style.fontSize = '40px';
            yes.style.animation = 'none';
            document.getElementById('mainTitle').innerText = "Tombol tak gedein nek kurang jelas";
        }

        function handleNo(e) {
            count++;
            no.innerText = "GAK BISA";
            if (count >= 4) {
                no.style.display = 'none';
            } else {
                no.style.position = 'fixed';
                no.style.left = Math.random() * (window.innerWidth - 120) + 'px';
                no.style.top = Math.random() * (window.innerHeight - 80) + 'px';
                no.style.zIndex = "999";

                w += 40; h += 30; f += 5;
                yes.style.width = w + 'px';
                yes.style.height = h + 'px';
                yes.style.fontSize = f + 'px';
                
                if(count > 2) yes.style.animation = "none";
            }
            if(e && e.preventDefault) e.preventDefault();
        }

        function handleYes() {
            gameEnded = true;
            clearInterval(timer);
            qBox.style.display = 'none';
            dBox.style.display = 'block';
        }

        // Event Listeners
        yes.onclick = handleYes;
        no.onclick = handleNo;
        no.onmouseover = handleNo; // Tambahan: Lari saat didekati mouse

        yes.ontouchstart = function(e) { e.preventDefault(); handleYes(); };
        no.ontouchstart = handleNo;

        document.getElementById('confirmBtn').onclick = function() {
            var val = document.getElementById('dateInput').value;
            if(!val) return alert("nahh, ga perlu jual mahal ish, shilakan dipilih ❤️");
            
            var dateObj = new Date(val);
            var options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            var formattedDate = dateObj.toLocaleDateString('en-US', options);

            dBox.style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.getElementById('finalMsg').innerHTML = "IT'S A DATE!<br><br>" + formattedDate;

            var text = "jemput ya ayy ❤ " + formattedDate;
            setTimeout(function() {
                window.location.href = "https://wa.me/" + myPhone + "?text=" + encodeURIComponent(text);
            }, 1500);
        };
    </script>
</body>
</html>
